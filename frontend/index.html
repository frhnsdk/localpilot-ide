<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LocalPilot IDE</title>

  <!-- Bootstrap 5 -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <!-- Bootstrap Icons -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    rel="stylesheet"
  />
  <!-- Custom IDE styles -->
  <link href="css/ide.css" rel="stylesheet" />
</head>
<body>

<!-- ═══ Top Toolbar ═══════════════════════════════════════════ -->
<nav class="navbar navbar-dark bg-dark border-bottom border-secondary px-3 py-1" id="toolbar">
  <span class="navbar-brand mb-0 fw-bold">
    <i class="bi bi-cpu"></i> LocalPilot IDE
  </span>
  <div class="d-flex gap-2">
    <button class="btn btn-sm btn-outline-light" id="btn-upload-zip" title="Upload project ZIP">
      <i class="bi bi-upload"></i> Upload ZIP
    </button>
    <input type="file" id="zip-input" accept=".zip" hidden />
    <button class="btn btn-sm btn-outline-light" id="btn-download-zip" title="Download project ZIP">
      <i class="bi bi-download"></i> Download ZIP
    </button>
    <button class="btn btn-sm btn-outline-secondary" id="btn-toggle-chat" title="Toggle AI Chat">
      <i class="bi bi-chat-dots"></i>
    </button>
  </div>
</nav>

<!-- ═══ Main Layout ═══════════════════════════════════════════ -->
<div id="main-container">

  <!-- ── Left: File Explorer ──────────────────────────────── -->
  <div id="sidebar">
    <div class="sidebar-header d-flex justify-content-between align-items-center px-2 py-1">
      <span class="text-uppercase small fw-bold text-secondary">Explorer</span>
      <div class="d-flex gap-1">
        <button class="btn btn-sm btn-link text-secondary p-0" id="btn-new-file" title="New File">
          <i class="bi bi-file-earmark-plus"></i>
        </button>
        <button class="btn btn-sm btn-link text-secondary p-0" id="btn-new-folder" title="New Folder">
          <i class="bi bi-folder-plus"></i>
        </button>
        <button class="btn btn-sm btn-link text-secondary p-0" id="btn-refresh" title="Refresh">
          <i class="bi bi-arrow-clockwise"></i>
        </button>
      </div>
    </div>
    <div id="file-tree" class="overflow-auto"></div>
  </div>

  <!-- ── Resize handle ────────────────────────────────────── -->
  <div class="resize-handle" id="resize-sidebar"></div>

  <!-- ── Centre: Editor ───────────────────────────────────── -->
  <div id="editor-panel">
    <div id="editor-tabs" class="d-flex overflow-auto border-bottom border-secondary"></div>
    <div id="editor-container"></div>
    <div id="status-bar" class="d-flex justify-content-between px-2 small text-secondary">
      <span id="status-file">No file open</span>
      <span id="status-cursor">Ln 1, Col 1</span>
    </div>
  </div>

  <!-- ── Resize handle ────────────────────────────────────── -->
  <div class="resize-handle" id="resize-chat"></div>

  <!-- ── Right: AI Chat ───────────────────────────────────── -->
  <div id="chat-panel">
    <div class="sidebar-header px-2 py-1">
      <span class="text-uppercase small fw-bold text-secondary">
        <i class="bi bi-robot"></i> AI Assistant
      </span>
    </div>
    <div id="chat-messages" class="overflow-auto p-2"></div>
    <div id="chat-input-area" class="p-2 border-top border-secondary">
      <textarea
        id="chat-input"
        class="form-control form-control-sm bg-dark text-light border-secondary"
        rows="3"
        placeholder="Ask LocalPilot…  (Shift+Enter for newline)"
      ></textarea>
      <button class="btn btn-sm btn-primary mt-1 w-100" id="btn-send-chat">
        <i class="bi bi-send"></i> Send
      </button>
    </div>
  </div>

</div>

<!-- ═══ Scripts ════════════════════════════════════════════════ -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Monaco Editor via CDN -->
<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js"></script>

<!-- App modules (order matters) -->
<script src="js/fileExplorer.js"></script>
<script src="js/editor.js"></script>
<script src="js/completion.js"></script>
<script src="js/chat.js"></script>
<script src="js/app.js"></script>
</body>
</html>
